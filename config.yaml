exchange:
  # Lighter Exchange Configuration
  symbol: "HYPEUSDC"                  # Trading pair
  private_key: ""                     # Required: Lighter private key (hex format)
  chain_id: 1                         # Lighter chain ID (1 for mainnet)
  api_url: "https://mainnet.zklighter.elliot.ai"  # Lighter API endpoint
  
  # Account Settings
  account_index: 1                    # Account index (default: 1)
  api_key_index: 0                    # API key index (default: 0)
  market_index: 0                     # Lighter market index (check Lighter API docs)

strategy:
  # Grid Settings
  max_safety_orders: 9

  # Fixed Quantity Mode - Direct quantity configuration
  # No value calculation, just place orders with specified quantities
  base_qty: 0.5                          # Base position quantity (e.g., 0.5 HYPE)
  safety_qtys: [0.5, 0.5, 1.0, 1.5, 2.5, 4.0, 6.5, 10.5, 17.0]  # Safety order quantities

  # ATR Settings
  atr_period: 14

storage:
  sqlite_path: "bot.db"
  redis_addr: "localhost:6379"
  redis_pass: ""
  redis_db: 0

log:
  level: "info"
